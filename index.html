<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ChessGPT Alpha 0.1</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="background"></div>

    <header>

        <h1>♟ ChessGPT</h1>

        <p>Alpha 0.1 - Construyendo una IA desde cero</p>

    </header>

    <main>

        <!-- ===================== -->
        <!-- TABLERO               -->
        <!-- ===================== -->

        <section class="game">

            <div id="board" class="board"></div>

        </section>

        <!-- ===================== -->
        <!-- PANEL LATERAL         -->
        <!-- ===================== -->

        <aside class="sidebar">

            <!-- Información de la IA -->

            <div class="card">

                <h2>🤖 ChessGPT</h2>

                <p><strong>Versión:</strong> Alpha 0.1</p>

                <p><strong>Estado:</strong></p>

                <span id="ia-status">
                    Iniciando...
                </span>

            </div>

            <!-- Chat -->

            <div class="card chat">

                <h2>Chat</h2>

                <div id="chat-messages">

                    <div class="bot">

                        Hola 👋

                        <br><br>

                        Soy ChessGPT.

                        <br>

                        Estoy iniciando mi cerebro...

                    </div>

                </div>

                <div class="chat-input">

                    <input
                        type="text"
                        id="user-input"
                        placeholder="Escribe un mensaje..."
                        autocomplete="off"
                    >

                    <button id="send-btn">

                        Enviar

                    </button>

                </div>

            </div>

            <!-- Información del cerebro -->

            <div class="card">

                <h2>Cerebro</h2>

                <p>

                    Memoria:
                    <span id="memory-size">

                        0

                    </span>

                </p>

                <p>

                    Conocimientos:
                    <span id="knowledge-size">

                        0

                    </span>

                </p>

            </div>

        </aside>

    </main>

    <!-- ===================== -->
    <!-- MOTOR DEL TABLERO     -->
    <!-- ===================== -->

    <script src="script.js"></script>

    <!-- ===================== -->
    <!-- IA                    -->
    <!-- ===================== -->

    <script src="ia/memoria.js"></script>

    <script src="ia/conocimiento.js"></script>

    <script src="ia/ia.js"></script>

    <!-- ===================== -->
    <!-- CHAT                  -->
    <!-- ===================== -->

    <script src="chat/chat.js"></script>

</body>

</html>
